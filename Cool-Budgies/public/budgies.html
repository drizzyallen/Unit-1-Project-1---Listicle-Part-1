<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script defer src="/scripts/header.js"></script>
    <script defer src="/scripts/budgies.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Budgie Gallery</title>

    <header></header>
    <main id="gift-content" class="container gift-info">
      <article class="bird-profile">

        <div class="gift-details">

          <p id="birthdayMonth"></p>
